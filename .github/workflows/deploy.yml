name: deploy
on:
  workflow_call:
    inputs:
      base_sha:
        required: true
        type: string
      deploy_sha:
        required: true
        type: string
      source_event_name:
        required: true
        type: string
      source_ref:
        required: true
        type: string
  workflow_run:
    workflows: ['oxc format']
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
      - '.zed/*'

jobs:
  deploy:
    name: 'deploy to production'
    if: |
      github.event_name == 'workflow_call' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      checks: write
    steps:
      - name: checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: download deploy metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@main
        with:
          name: deploy-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .deploy

      - name: resolve deploy inputs
        id: resolve
        run: |
          SHOULD_DEPLOY="false"
          DEPLOY_SHA=""

          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            if [ "${{ inputs.source_event_name }}" = "push" ] && [ "${{ inputs.source_ref }}" = "refs/heads/main" ]; then
              SHOULD_DEPLOY="true"
              DEPLOY_SHA="${{ inputs.deploy_sha }}"
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            . .deploy/deploy.env
            SHOULD_DEPLOY="true"
            DEPLOY_SHA="$deploy_sha"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            DEPLOY_SHA="${{ github.sha }}"

            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-list --max-parents=0 "$DEPLOY_SHA")"
            fi

            if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              echo "Cannot resolve BASE_SHA ($BASE_SHA) locally. Refusing to guess; skipping direct deploy."
            elif ! CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$DEPLOY_SHA")"; then
              echo "git diff failed. Refusing to guess; skipping direct deploy."
            else
              echo "Changed files ($BASE_SHA..$DEPLOY_SHA):"
              echo "$CHANGED_FILES"

              NON_IGNORED_FILES=""

              while IFS= read -r file; do
                [ -z "$file" ] && continue
                case "$file" in
                  *.md|.gitignore|README*|LICENSE) ;;
                  *) NON_IGNORED_FILES="$NON_IGNORED_FILES $file" ;;
                esac
              done <<< "$CHANGED_FILES"

              if [ -z "$NON_IGNORED_FILES" ]; then
                SHOULD_DEPLOY="true"
              else
                echo "Skipping direct deploy because this push includes files handled by the OXC workflow:"
                echo "$NON_IGNORED_FILES" | xargs -n1 echo
              fi
            fi
          fi

          {
            echo "should_deploy=$SHOULD_DEPLOY"
            echo "deploy_sha=$DEPLOY_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: create pending check run
        if: github.event_name == 'workflow_run' && steps.resolve.outputs.should_deploy == 'true'
        id: check
        uses: actions/github-script@main
        with:
          script: |
            const { data } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'deploy',
              head_sha: '${{ steps.resolve.outputs.deploy_sha }}',
              status: 'in_progress'
            })
            core.setOutput('check_id', data.id)

      - name: checkout deploy sha
        if: steps.resolve.outputs.should_deploy == 'true'
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.deploy_sha }}

      - name: verify deploy sha belongs to main
        if: steps.resolve.outputs.should_deploy == 'true'
        run: |
          git fetch origin refs/heads/main:refs/remotes/origin/main --force

          if ! git merge-base --is-ancestor "${{ steps.resolve.outputs.deploy_sha }}" origin/main; then
            echo "Refusing deploy: ${{ steps.resolve.outputs.deploy_sha }} is not contained in origin/main."
            exit 1
          fi

      - name: setup ssh
        if: steps.resolve.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          cat >>~/.ssh/config << END
          Host prod
            HostName $SSH_HOST
            User $SSH_USERNAME
            Port $SSH_PORT
            IdentityFile ~/.ssh/key
            StrictHostKeyChecking no
          END
        env:
          SSH_USERNAME: ${{ secrets.USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOST }}
          SSH_PORT: 22

      - name: deploy
        if: steps.resolve.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
        run: |
          ssh prod "cd portfolio && DEPLOY_SHA=\"$DEPLOY_SHA\" bash -c '
            set -euo pipefail

            git fetch origin main
            git switch -C main \"\$DEPLOY_SHA\"
            git branch --set-upstream-to=origin/main main || true

            docker compose up -d --build
          '"

      - name: update check run status
        if: always() && github.event_name == 'workflow_run' && steps.check.outputs.check_id != ''
        uses: actions/github-script@main
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.check.outputs.check_id }},
              status: 'completed',
              conclusion
            })
